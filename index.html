<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cool Contact Form</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
    }

    .form-container {
      background: white;
      padding: 35px;
      width: 400px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: fadeIn 0.7s ease;
    }

    .form-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    label {
      display: block;
      margin-bottom: 18px;
      color: #444;
      font-weight: bold;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 2px solid #ddd;
      border-radius: 10px;
      outline: none;
      transition: 0.3s;
      font-size: 15px;
    }

    input:focus,
    textarea:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 8px rgba(79, 70, 229, 0.3);
    }

    textarea {
      resize: none;
      height: 120px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 450px) {
      .form-container {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <div class="form-container">
    <h2>Aanleveren punten werkoverleg 9 juni 2026</h2>

    <form
      action="https://formspree.io/f/xredznjw"
      method="POST"
    >
      <label>
        Naam:
        <input type="text" name="name" placeholder="Enter your name">
      </label>

      <!-- Keuze naam of anoniem -->
      <div class="radio-group">
        <strong>Naam weergeven of anoniem??</strong><br><br>

        <label>
          <input type="radio" name="visibility" value="Name" checked>
          Naam
        </label>
        
        <label>
          <input type="radio" name="visibility" value="Anonymous">
          Anoniem
        </label>
      </div>
      
      <label>
        E-mail adres:
        <input 
          type="email" 
          name="email" 
          value="test@test.nl"
          placeholder="Enter your email" 
          required
        >
      </label>

      <label>
        Bespreekpunt:
        <textarea name="message" placeholder="Noteer hier je bespreekpunten voor het werkoverleg" required></textarea>
      </label>

      <button type="submit">Verstuur bericht naar Sudhir</button>
    </form>
  </div>

</body>
</html>
